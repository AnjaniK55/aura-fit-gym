version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: aurafit-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: aurafit-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/gymdb
      - JWT_SECRET=a7f3k9x2m8p4q1w6e0r5t3y8u2i7o9l4s6d1f8g3h5j0k2z7v4b9n1c6x8m3
      - NODE_ENV=production
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: aurafit-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data:
